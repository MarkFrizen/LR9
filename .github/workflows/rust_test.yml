# CI для тестирования Rust-модуля pyo3-sum
name: Rust Test (pyo3-sum)

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
    paths:
      - 'benchmark/pyo3-sum/**'
      - '.github/workflows/rust_test.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'benchmark/pyo3-sum/**'
      - '.github/workflows/rust_test.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Тестирование Rust кода
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            benchmark/pyo3-sum/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('benchmark/pyo3-sum/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Rust formatting
        working-directory: benchmark/pyo3-sum
        run: cargo fmt -- --check

      - name: Run Clippy linter
        working-directory: benchmark/pyo3-sum
        run: cargo clippy -- -D warnings

      - name: Run Rust tests
        working-directory: benchmark/pyo3-sum
        run: cargo test --verbose

  # Тестирование Python-интеграции
  python-integration:
    name: Python Integration
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            benchmark/pyo3-sum/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('benchmark/pyo3-sum/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install maturin
        run: pip install maturin

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Activate virtualenv and build pyo3-sum
        working-directory: benchmark/pyo3-sum
        run: |
          source ../../.venv/bin/activate
          maturin develop --release

      - name: Run Python tests
        working-directory: benchmark/pyo3-sum
        run: |
          source ../../.venv/bin/activate
          python -c "import pyo3_sum; assert pyo3_sum.sum_of_squares(10) == 385"
          python -c "import pyo3_sum; assert pyo3_sum.sum_of_squares(0) == 0"
          python -c "import pyo3_sum; assert pyo3_sum.sum_of_squares(1) == 1"
          python -c "import pyo3_sum; assert pyo3_sum.sum_of_squares(100) == 338350"
          echo "✅ All Python integration tests passed!"

  # Бенчмарк производительности
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: [python-integration]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install maturin matplotlib

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Build pyo3-sum
        working-directory: benchmark/pyo3-sum
        run: |
          source ../../.venv/bin/activate
          maturin develop --release

      - name: Run benchmark
        working-directory: benchmark
        run: |
          source .venv/bin/activate
          python benchmark.py -n 1000000 -i 5 --no-plot

      - name: Upload benchmark results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: benchmark-results-${{ github.run_number }}
          path: benchmark/benchmark_results_*.csv
          retention-days: 30
