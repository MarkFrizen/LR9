# Публикация Rust-модуля pyo3-sum на PyPI
name: Publish pyo3-sum to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  PACKAGE_DIR: benchmark/pyo3-sum

jobs:
  # Автоматическое увеличение версии
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.new_version.outputs.new_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Get current version from PyPI
        id: pypi_version
        run: |
          CURRENT_VERSION=$(curl -s https://pypi.org/pypi/pyo3-sum/json | jq -r '.info.version // "0.1.0"')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version on PyPI: $CURRENT_VERSION"

      - name: Calculate new version
        id: new_version
        run: |
          CURRENT="${{ steps.pypi_version.outputs.current_version }}"
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update version in Cargo.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.new_version.outputs.new_version }}\"/" benchmark/pyo3-sum/Cargo.toml

      - name: Update version in pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.new_version.outputs.new_version }}\"/" benchmark/pyo3-sum/pyproject.toml

      - name: Commit and push version bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add benchmark/pyo3-sum/Cargo.toml benchmark/pyo3-sum/pyproject.toml
          git commit -m "Bump version to ${{ steps.new_version.outputs.new_version }} [skip ci]" || echo "No changes to commit"
          git push

  # Сборка wheel для разных платформ
  build-wheels:
    name: Build Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [bump-version]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        working-directory: ${{ env.PACKAGE_DIR }}
        run: |
          maturin build --release --target ${{ matrix.target }}

      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: ${{ env.PACKAGE_DIR }}/target/wheels/*.whl
          retention-days: 7

  # Публикация на PyPI
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [bump-version, build-wheels]
    environment:
      name: pypi
      url: https://pypi.org/p/pyo3-sum
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v5
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          verbose: true
