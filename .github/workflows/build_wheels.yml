# Кроссплатформенная сборка pyo3-sum с использованием manylinux
name: Build pyo3-sum Wheels (manylinux)

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Upload wheels to GitHub Releases'
        required: false
        type: boolean
        default: true
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  PACKAGE_DIR: benchmark/pyo3-sum

jobs:
  # Linux manylinux сборка
  linux:
    name: Linux (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_34
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_2
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_34
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            manylinux: musllinux_1_2
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            manylinux: manylinux_2_34
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            manylinux: manylinux_2_34
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: --release --out dist
          working-directory: ${{ env.PACKAGE_DIR }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: ${{ env.PACKAGE_DIR }}/dist/*.whl
          retention-days: 7

  # Windows сборка
  windows:
    name: Windows (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: i686-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          working-directory: ${{ env.PACKAGE_DIR }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: ${{ env.PACKAGE_DIR }}/dist/*.whl
          retention-days: 7

  # macOS сборка
  macos:
    name: macOS (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          working-directory: ${{ env.PACKAGE_DIR }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: ${{ env.PACKAGE_DIR }}/dist/*.whl
          retention-days: 7

  # macOS universal2 (Intel + Apple Silicon)
  macos-universal:
    name: macOS Universal2
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build universal2 wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --universal2 --out dist
          working-directory: ${{ env.PACKAGE_DIR }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-universal2
          path: ${{ env.PACKAGE_DIR }}/dist/*.whl
          retention-days: 7

  # Сборка всех wheel'ов и публикация
  merge-and-release:
    name: Merge and Release
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, macos-universal]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    permissions:
      contents: write
    
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: List wheels
        run: |
          echo "📦 Built wheels:"
          ls -la dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
