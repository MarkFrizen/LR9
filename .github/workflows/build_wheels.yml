# Кроссплатформенная сборка pyo3-sum с использованием manylinux
name: Build pyo3-sum Wheels (manylinux)

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Upload wheels to GitHub Releases'
        required: false
        type: boolean
        default: true
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  PACKAGE_DIR: benchmark/pyo3-sum

jobs:
  # Linux manylinux сборка
  linux:
    name: Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-gnu
          manylinux: manylinux_2_34
          args: --release --out dist
          working-directory: ${{ env.PACKAGE_DIR }}

      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-linux
          path: ${{ env.PACKAGE_DIR }}/dist/*.whl
          retention-days: 7

  # Windows сборка
  windows:
    name: Windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist
          working-directory: ${{ env.PACKAGE_DIR }}

      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-windows
          path: ${{ env.PACKAGE_DIR }}/dist/*.whl
          retention-days: 7

  # Сборка всех wheel'ов и публикация
  merge-and-release:
    name: Merge and Release
    runs-on: ubuntu-latest
    needs: [linux, windows]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    permissions:
      contents: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v5
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: List wheels
        run: |
          echo "📦 Built wheels:"
          ls -la dist/

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.whl
          tag_name: wheels-${{ github.run_id }}
          name: Wheels build #${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
